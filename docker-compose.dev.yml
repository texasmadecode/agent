version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketing_agent_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d marketing_agent_dev"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for development
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Marketing Agent API (Development)
  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dev_user:dev_password@postgres:5432/marketing_agent_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "true"
      ENVIRONMENT: development
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./app:/app/app:ro
      - uploads_dev_data:/app/uploads
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Development mode starting...' &&
        sleep 5 &&
        alembic upgrade head &&
        python -m app.core.init_db &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_dev_data:
  uploads_dev_data:
