name: 🧪 Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: marketing_agent_test

jobs:
  unit-tests:
    name: 🔬 Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock httpx

    - name: ⚙️ Set up test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}" >> .env
        echo "REDIS_URL=redis://localhost:6379/0" >> .env
        echo "SECRET_KEY=test-secret-key-for-github-actions-very-long-and-secure" >> .env
        echo "OPENAI_API_KEY=sk-test-key-for-testing-purposes-only" >> .env
        echo "ENVIRONMENT=test" >> .env

    - name: 🗄️ Setup database
      run: |
        alembic upgrade head
        python -m app.core.init_db

    - name: 🧪 Run unit tests
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella-${{ matrix.python-version }}

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: ⚙️ Set up test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}" >> .env
        echo "REDIS_URL=redis://localhost:6379/0" >> .env
        echo "SECRET_KEY=test-secret-key-for-integration-tests" >> .env
        echo "OPENAI_API_KEY=sk-test-key-for-testing-purposes-only" >> .env
        echo "ENVIRONMENT=test" >> .env

    - name: 🗄️ Setup database
      run: |
        alembic upgrade head
        python -m app.core.init_db

    - name: 🚀 Start application
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
        
    - name: 🔍 Test API endpoints
      run: |
        # Test health endpoint
        curl -f http://localhost:8000/health || exit 1
        
        # Test API documentation
        curl -f http://localhost:8000/docs || exit 1
        
        # Test main dashboard
        curl -f http://localhost:8000/ || exit 1

    - name: 🧪 Run integration tests
      run: |
        pytest tests/integration/ -v || true

  docker-tests:
    name: 🐳 Docker Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: ⚙️ Create test environment file
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@postgres:5432/marketing_agent" >> .env
        echo "REDIS_URL=redis://redis:6379/0" >> .env
        echo "SECRET_KEY=test-secret-key-for-docker-tests" >> .env
        echo "OPENAI_API_KEY=sk-test-key-for-testing-purposes-only" >> .env
        echo "ENVIRONMENT=test" >> .env

    - name: 🐳 Build Docker image
      run: |
        docker build -t marketing-agent:test .

    - name: 🚀 Test Docker Compose
      run: |
        docker-compose -f docker-compose.yml up -d
        sleep 30
        
        # Test if services are running
        docker-compose ps
        
        # Test health endpoint
        curl -f http://localhost:8000/health || exit 1
        
        # Clean up
        docker-compose down

  load-tests:
    name: ⚡ Load Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install locust

    - name: ⚙️ Create load test script
      run: |
        cat > locustfile.py << 'EOF'
        from locust import HttpUser, task, between
        
        class MarketingAgentUser(HttpUser):
            wait_time = between(1, 3)
            
            @task(3)
            def health_check(self):
                self.client.get("/health")
            
            @task(2)
            def api_docs(self):
                self.client.get("/docs")
            
            @task(1)
            def dashboard(self):
                self.client.get("/")
        EOF

    - name: 🐳 Start application with Docker
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@postgres:5432/marketing_agent" >> .env
        echo "REDIS_URL=redis://redis:6379/0" >> .env
        echo "SECRET_KEY=test-secret-key-for-load-tests" >> .env
        echo "OPENAI_API_KEY=sk-test-key-for-testing-purposes-only" >> .env
        docker-compose up -d
        sleep 30

    - name: ⚡ Run load tests
      run: |
        locust -f locustfile.py --host=http://localhost:8000 --users 10 --spawn-rate 2 --run-time 60s --headless

    - name: 🧹 Cleanup
      run: |
        docker-compose down

  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔧 Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety semgrep

    - name: 🛡️ Run Bandit security scan
      run: |
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/

    - name: 🔍 Run Safety check
      run: |
        safety check --json --output safety-report.json || true
        safety check

    - name: 🔎 Run Semgrep scan
      run: |
        semgrep --config=auto app/ --json --output semgrep-report.json || true

    - name: 📊 Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          semgrep-report.json

  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, docker-tests, security-tests]
    if: always()

    steps:
    - name: 📋 Summarize test results
      run: |
        echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Tests | ${{ needs.docker-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Tests | ${{ needs.security-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Overall Status:** ${{ (needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.docker-tests.result == 'success' && needs.security-tests.result == 'success') && '🎉 All tests passed!' || '⚠️ Some tests failed' }}" >> $GITHUB_STEP_SUMMARY
